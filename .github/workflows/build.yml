name: Build APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip wget \
            openjdk-11-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libltdl-dev libffi-dev libssl-dev \
            cmake ninja-build \
            python3-pip
          pip install --upgrade pip
          pip install buildozer cython virtualenv
      - name: Accept Android SDK Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "build-tools;33.0.2" \
            "platforms;android-33" \
            "ndk;25.2.9519653"
      - name: Configure Buildozer to use existing SDK
        run: |
          mkdir -p ~/.buildozer/android/platform
          ln -sfn $ANDROID_HOME \
            ~/.buildozer/android/platform/android-sdk
          ln -sfn $ANDROID_HOME/ndk/25.2.9519653 \
            ~/.buildozer/android/platform/android-ndk-r25b
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" \
            >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" \
            >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager \
            ~/.buildozer/android/platform/android-sdk/tools/bin/avdmanager
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-
      - name: Build APK
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          ANDROIDSDK: /home/runner/.buildozer/android/platform/android-sdk
          ANDROIDNDK: /home/runner/.buildozer/android/platform/android-ndk-r25b
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "21"
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          echo "=== LAST 50 LINES ==="
          tail -50 build.log
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-agri-app-debug
          path: bin/*.apk
      - name: Upload build log on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
